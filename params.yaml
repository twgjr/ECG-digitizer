data:
  # Path where the Kaggle dataset is mounted or downloaded on Azure ML.
  # Override at runtime: dvc repro --set-param data.root_path=/mnt/azureml/...
  root_path: data/raw
  scale_dim: 512
  target_lead: null          # null = all leads; or e.g. "I", "II", etc.
  train_folds: [1, 2, 3, 4, 5, 6, 7, 8]
  val_folds: [9]
  test_folds: [10]
  # T4 = 16GB VRAM. 512x512 images are large; 16 keeps memory safe.
  # Use accumulate_grad_batches in each stage to simulate a larger effective batch.
  batch_size: 16
  num_workers: 4             # parallel DataLoader workers on Azure ML compute
  pin_memory: true

training:
  seed: 42
  precision: 16-mixed        # fp16 AMP — significant speedup on T4 tensor cores

# Stage 1 numeric hyperparams tracked by DVC (dvc params diff).
# The full trainer config (callbacks, logger, etc.) lives in configs/signal_autoencoder.yaml.
signal_autoencoder:
  run_name: run_003   # change this each run; used for checkpoint dir name
  max_epochs: 50
  lr: 1.0e-3
  batch_size: 256
  latent_dim: 32
  depth: 4
  base_kernels: 16
